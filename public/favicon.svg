<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Charles yapping zone favicon</title>
  <desc id="desc">Dark rounded square favicon with CZ initials.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#101a25" />
      <stop offset="100%" stop-color="#071018" />
    </linearGradient>
    <linearGradient id="stroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4b483" />
      <stop offset="100%" stop-color="#75dfd5" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="108" height="108" rx="28" fill="url(#bg)" stroke="url(#stroke)" stroke-width="3" />
  <text
    x="64"
    y="73"
    text-anchor="middle"
    font-size="34"
    font-family="Iowan Old Style, Palatino Linotype, Georgia, serif"
    fill="#eef2f7"
    letter-spacing="4"
  >
    CZ
  </text>
</svg>
